<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastique CRM - Manager Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        body {
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Elastique Manager</h1>
                <p class="text-gray-500">Real-Time Performance Dashboard</p>
            </div>
            <button onclick="refreshData()"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                Refresh Data
            </button>
        </header>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-medium text-gray-500">Total Sessions</h3>
                <p id="kpi-sessions" class="text-3xl font-bold text-gray-900 mt-2">--</p>
                <span class="text-green-500 text-sm"> Live</span>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-medium text-gray-500">Leads Captured</h3>
                <p id="kpi-leads" class="text-3xl font-bold text-gray-900 mt-2">--</p>
                <div id="leads-bar" class="w-full bg-gray-200 h-1 mt-2 rounded-full overflow-hidden">
                    <div class="bg-green-500 h-1" style="width: 0%"></div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-medium text-gray-500">Conversion Rate</h3>
                <p id="kpi-rate" class="text-3xl font-bold text-gray-900 mt-2">--%</p>
                <span class="text-gray-400 text-sm">Target: 5.0%</span>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-medium text-gray-500">Protocols Generated</h3>
                <p id="kpi-revenue" class="text-3xl font-bold text-gray-900 mt-2">--</p>
                <span class="text-indigo-500 text-sm">High Engagement</span>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Live Feed -->
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-100 flex justify-between">
                    <h3 class="font-semibold text-gray-900">Live Conversation Feed</h3>
                    <span class="text-xs font-mono text-gray-400 bg-gray-50 px-2 py-1 rounded">REAL-TIME</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="text-xs text-gray-500 uppercase bg-gray-50">
                            <tr>
                                <th class="px-6 py-3">User / Email</th>
                                <th class="px-6 py-3">Status</th>
                                <th class="px-6 py-3">Messages</th>
                                <th class="px-6 py-3">Time</th>
                            </tr>
                        </thead>
                        <tbody id="feed-table-body">
                            <!-- Rows injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Funnel Chart -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="font-semibold text-gray-900 mb-4">Engagement Funnel</h3>
                <canvas id="funnelChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        async function fetchData(endpoint) {
            const res = await fetch(`/api/analytics/${endpoint}`);
            return await res.json();
        }

        async function refreshData() {
            // 1. Summary KPIs
            const summary = await fetchData('summary');
            document.getElementById('kpi-sessions').innerText = summary.total_sessions;
            document.getElementById('kpi-leads').innerText = summary.active_leads;
            document.getElementById('kpi-rate').innerText = summary.conversion_rate + '%';

            // 2. Funnel Data
            const funnel = await fetchData('funnel');
            const funnelLabels = funnel.map(f => f.stage);
            const funnelData = funnel.map(f => f.count);

            // Render Chart
            renderChart(funnelLabels, funnelData);

            // Protocols count (hack: grab from funnel)
            if (funnel[2]) document.getElementById('kpi-revenue').innerText = funnel[2].count;

            // 3. Live Feed
            const sessions = await fetchData('conversations');
            const tbody = document.getElementById('feed-table-body');
            tbody.innerHTML = '';

            sessions.forEach(s => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-50 hover:bg-gray-50 transition";

                const userClass = s.user.includes('@') ? 'text-indigo-600 font-medium' : 'text-gray-500 italic';

                tr.innerHTML = `
                    <td class="px-6 py-4 ${userClass}">${s.user}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                            ${s.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-gray-500">${s.msg_count}</td>
                    <td class="px-6 py-4 text-gray-400 text-xs">${new Date(s.time).toLocaleTimeString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        let chartInstance = null;
        function renderChart(labels, data) {
            const ctx = document.getElementById('funnelChart').getContext('2d');

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Users',
                        data: data,
                        backgroundColor: ['#6366f1', '#10b981', '#f59e0b'],
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Init
        // Fix syntax error in fetch definition (async def -> async function)
        refreshData();
        setInterval(refreshData, 3000); // Live poll every 3s
    </script>
</body>

</html>
